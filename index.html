<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stack Visualizer</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="page">

    <header class="header">
      <span class="header-title">STACK VISUALIZER</span>
      <span class="header-sub">LIFO — Last In, First Out: BY BSIT-2B</span>
    </header>

    <div class="main">

      <div class="left">

        <div class="controls">
          <div class="input-row">
            <input type="number" id="numInput" class="input" placeholder="integer…" min="-9999" max="9999" />
            <button class="btn-icon" id="btnRandom" title="Random number">?</button>
          </div>
          <div class="btn-row">
            <button class="btn" id="btnPush">PUSH</button>
            <button class="btn" id="btnPop">POP</button>
            <button class="btn" id="btnPeek">PEEK</button>
            <button class="btn" id="btnClear">CLEAR</button>
            <button class="btn btn-ghost" id="btnUndo">UNDO</button>
          </div>
          <p class="error-msg" id="errorMsg" aria-live="polite"></p>
        </div>

        <div class="speed-row">
          <span class="speed-label">SPEED</span>
          <input type="range" id="speedSlider" min="1" max="5" value="3" class="slider" />
          <span class="speed-val" id="speedVal">Normal</span>
        </div>

        <div class="stack-info">
          <div class="info-cell">
            <span class="info-label">SIZE</span>
            <span class="info-val" id="infoSize">0</span>
          </div>
          <div class="info-cell">
            <span class="info-label">TOP</span>
            <span class="info-val" id="infoTop">—</span>
          </div>
          <div class="info-cell">
            <span class="info-label">STATUS</span>
            <span class="info-val" id="infoStatus">empty</span>
          </div>
        </div>

      </div>

      <div class="right">
        <div class="stack-wrap">
          <div class="stack-container" id="stackContainer">
            <div class="stack-empty" id="emptyMsg">empty</div>
          </div>
          <div class="stack-floor">▔▔▔ BASE ▔▔▔</div>
        </div>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
